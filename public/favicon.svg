  <!-- Pin 2 — destination (terracotta) -->
  <path
    d="M 22 27 C 19.5 23.5 17 21.5 17 20 A 5 5 0 0 1 27 20 C 27 21.5 24.5 23.5 22 27 Z"
    fill="#c8582a"
  />
  <circle cx="22" cy="19" r="1.8" fill="#1a1814"/>
</svg>

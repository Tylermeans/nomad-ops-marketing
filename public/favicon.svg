<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#1a1814"/>

  <!-- Route line -->
  <path
    d="M 10 19 C 10 24 22 16 22 15"
    stroke="#c8582a"
    stroke-width="1.5"
    stroke-dasharray="2.5 2.5"

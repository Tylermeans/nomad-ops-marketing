<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <!-- Background -->
  <rect width="800" height="600" rx="16" fill="#f5f0e8"/>

  <!-- Title area -->
  <text x="60" y="60" font-family="Georgia, serif" font-size="14" fill="#78716c" letter-spacing="2">DESIGN ITERATION</text>

  <!-- Axis labels -->
  <text x="60" y="560" font-family="system-ui, sans-serif" font-size="11" fill="#78716c">Round 1</text>
  <text x="220" y="560" font-family="system-ui, sans-serif" font-size="11" fill="#78716c">Round 2</text>
  <text x="380" y="560" font-family="system-ui, sans-serif" font-size="11" fill="#78716c">Round 3</text>
  <text x="540" y="560" font-family="system-ui, sans-serif" font-size="11" fill="#78716c">Final</text>

  <!-- Y-axis label -->
  <text x="25" y="300" font-family="system-ui, sans-serif" font-size="11" fill="#78716c" transform="rotate(-90 25 300)" text-anchor="middle">Conversion Score</text>

  <!-- Grid lines -->
  <line x1="60" y1="530" x2="700" y2="530" stroke="#d4c5a9" stroke-width="0.5"/>
  <line x1="60" y1="430" x2="700" y2="430" stroke="#d4c5a9" stroke-width="0.5" stroke-dasharray="4 4"/>
  <line x1="60" y1="330" x2="700" y2="330" stroke="#d4c5a9" stroke-width="0.5" stroke-dasharray="4 4"/>
  <line x1="60" y1="230" x2="700" y2="230" stroke="#d4c5a9" stroke-width="0.5" stroke-dasharray="4 4"/>
  <line x1="60" y1="130" x2="700" y2="130" stroke="#d4c5a9" stroke-width="0.5" stroke-dasharray="4 4"/>

  <!-- Y-axis values -->
  <text x="50" y="534" font-family="system-ui, sans-serif" font-size="10" fill="#a8a29e" text-anchor="end">0</text>
  <text x="50" y="434" font-family="system-ui, sans-serif" font-size="10" fill="#a8a29e" text-anchor="end">25</text>
  <text x="50" y="334" font-family="system-ui, sans-serif" font-size="10" fill="#a8a29e" text-anchor="end">50</text>
  <text x="50" y="234" font-family="system-ui, sans-serif" font-size="10" fill="#a8a29e" text-anchor="end">75</text>
  <text x="50" y="134" font-family="system-ui, sans-serif" font-size="10" fill="#a8a29e" text-anchor="end">100</text>

  <!-- Box & Whisker 1 — Round 1: wide spread, low median -->
  <!-- Whisker line (min to max) -->
  <line x1="110" y1="480" x2="110" y2="200" stroke="#292524" stroke-width="1.5"/>
  <!-- Min cap -->
  <line x1="90" y1="480" x2="130" y2="480" stroke="#292524" stroke-width="1.5"/>
  <!-- Max cap -->
  <line x1="90" y1="200" x2="130" y2="200" stroke="#292524" stroke-width="1.5"/>
  <!-- Box (Q1 to Q3) -->
  <rect x="80" y="280" width="60" height="140" rx="3" fill="#e8a060" fill-opacity="0.3" stroke="#e8a060" stroke-width="2"/>
  <!-- Median line -->
  <line x1="80" y1="370" x2="140" y2="370" stroke="#c8582a" stroke-width="2.5"/>

  <!-- Box & Whisker 2 — Round 2: narrower, median rising -->
  <line x1="270" y1="420" x2="270" y2="170" stroke="#292524" stroke-width="1.5"/>
  <line x1="250" y1="420" x2="290" y2="420" stroke="#292524" stroke-width="1.5"/>
  <line x1="250" y1="170" x2="290" y2="170" stroke="#292524" stroke-width="1.5"/>
  <rect x="240" y="240" width="60" height="120" rx="3" fill="#e8a060" fill-opacity="0.4" stroke="#e8a060" stroke-width="2"/>
  <line x1="240" y1="300" x2="300" y2="300" stroke="#c8582a" stroke-width="2.5"/>

  <!-- Box & Whisker 3 — Round 3: tight, high median -->
  <line x1="430" y1="330" x2="430" y2="140" stroke="#292524" stroke-width="1.5"/>
  <line x1="410" y1="330" x2="450" y2="330" stroke="#292524" stroke-width="1.5"/>
  <line x1="410" y1="140" x2="450" y2="140" stroke="#292524" stroke-width="1.5"/>
  <rect x="400" y="190" width="60" height="90" rx="3" fill="#e8a060" fill-opacity="0.5" stroke="#e8a060" stroke-width="2"/>
  <line x1="400" y1="230" x2="460" y2="230" stroke="#c8582a" stroke-width="2.5"/>

  <!-- Box & Whisker 4 — Final: very tight, very high -->
  <line x1="590" y1="210" x2="590" y2="110" stroke="#292524" stroke-width="1.5"/>
  <line x1="570" y1="210" x2="610" y2="210" stroke="#292524" stroke-width="1.5"/>
  <line x1="570" y1="110" x2="610" y2="110" stroke="#292524" stroke-width="1.5"/>
  <rect x="560" y="130" width="60" height="60" rx="3" fill="#c8582a" fill-opacity="0.25" stroke="#c8582a" stroke-width="2"/>
  <line x1="560" y1="155" x2="620" y2="155" stroke="#c8582a" stroke-width="2.5"/>

  <!-- Trend arrow -->
  <path d="M 140 370 Q 300 280 420 230 Q 500 200 560 155" stroke="#c8582a" stroke-width="1.5" stroke-dasharray="6 4" fill="none"/>
  <polygon points="558,150 568,158 558,160" fill="#c8582a"/>

  <!-- Annotation -->
  <rect x="580" y="80" width="140" height="36" rx="6" fill="#292524"/>
  <text x="650" y="103" font-family="system-ui, sans-serif" font-size="12" fill="#faf9f6" text-anchor="middle" font-weight="600">Optimized</text>

  <!-- Scatter dots for data points feel -->
  <circle cx="95" cy="350" r="3" fill="#e8a060" opacity="0.5"/>
  <circle cx="125" cy="400" r="3" fill="#e8a060" opacity="0.5"/>
  <circle cx="100" cy="300" r="3" fill="#e8a060" opacity="0.5"/>
  <circle cx="120" cy="450" r="3" fill="#e8a060" opacity="0.5"/>
  <circle cx="255" cy="280" r="3" fill="#e8a060" opacity="0.5"/>
  <circle cx="285" cy="340" r="3" fill="#e8a060" opacity="0.5"/>
  <circle cx="260" cy="260" r="3" fill="#e8a060" opacity="0.5"/>
  <circle cx="415" cy="220" r="3" fill="#e8a060" opacity="0.6"/>
  <circle cx="445" cy="250" r="3" fill="#e8a060" opacity="0.6"/>
  <circle cx="575" cy="150" r="3" fill="#c8582a" opacity="0.6"/>
  <circle cx="605" cy="165" r="3" fill="#c8582a" opacity="0.6"/>
</svg>

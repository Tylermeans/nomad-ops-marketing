<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <!-- Background -->
  <rect width="800" height="600" rx="16" fill="#f5f0e8"/>

  <!-- Title -->
  <text x="60" y="60" font-family="Georgia, serif" font-size="14" fill="#78716c" letter-spacing="2">ORGANIC TRAFFIC GROWTH</text>

  <!-- Y-axis labels -->
  <text x="50" y="504" font-family="system-ui, sans-serif" font-size="10" fill="#a8a29e" text-anchor="end">0</text>
  <text x="50" y="404" font-family="system-ui, sans-serif" font-size="10" fill="#a8a29e" text-anchor="end">500</text>
  <text x="50" y="304" font-family="system-ui, sans-serif" font-size="10" fill="#a8a29e" text-anchor="end">1K</text>
  <text x="50" y="204" font-family="system-ui, sans-serif" font-size="10" fill="#a8a29e" text-anchor="end">1.5K</text>
  <text x="50" y="120" font-family="system-ui, sans-serif" font-size="10" fill="#a8a29e" text-anchor="end">2K</text>

  <!-- Grid lines -->
  <line x1="60" y1="500" x2="740" y2="500" stroke="#d4c5a9" stroke-width="0.5"/>
  <line x1="60" y1="400" x2="740" y2="400" stroke="#d4c5a9" stroke-width="0.5" stroke-dasharray="4 4"/>
  <line x1="60" y1="300" x2="740" y2="300" stroke="#d4c5a9" stroke-width="0.5" stroke-dasharray="4 4"/>
  <line x1="60" y1="200" x2="740" y2="200" stroke="#d4c5a9" stroke-width="0.5" stroke-dasharray="4 4"/>
  <line x1="60" y1="116" x2="740" y2="116" stroke="#d4c5a9" stroke-width="0.5" stroke-dasharray="4 4"/>

  <!-- X-axis labels (months) -->
  <text x="100" y="530" font-family="system-ui, sans-serif" font-size="10" fill="#78716c" text-anchor="middle">Jan</text>
  <text x="180" y="530" font-family="system-ui, sans-serif" font-size="10" fill="#78716c" text-anchor="middle">Feb</text>
  <text x="260" y="530" font-family="system-ui, sans-serif" font-size="10" fill="#78716c" text-anchor="middle">Mar</text>
  <text x="340" y="530" font-family="system-ui, sans-serif" font-size="10" fill="#78716c" text-anchor="middle">Apr</text>
  <text x="420" y="530" font-family="system-ui, sans-serif" font-size="10" fill="#78716c" text-anchor="middle">May</text>
  <text x="500" y="530" font-family="system-ui, sans-serif" font-size="10" fill="#78716c" text-anchor="middle">Jun</text>
  <text x="580" y="530" font-family="system-ui, sans-serif" font-size="10" fill="#78716c" text-anchor="middle">Jul</text>
  <text x="660" y="530" font-family="system-ui, sans-serif" font-size="10" fill="#78716c" text-anchor="middle">Aug</text>

  <!-- Area fill under curve -->
  <path d="M 100 480 C 140 475 160 465 180 460 C 210 450 240 440 260 420 C 290 395 320 370 340 350 C 370 320 400 290 420 260 C 450 225 480 200 500 185 C 530 168 560 155 580 148 C 610 140 640 132 660 125 L 660 500 L 100 500 Z"
    fill="url(#areaGradient)" opacity="0.6"/>

  <defs>
    <linearGradient id="areaGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8582a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#c8582a" stop-opacity="0.02"/>
    </linearGradient>
  </defs>

  <!-- Main growth line -->
  <path d="M 100 480 C 140 475 160 465 180 460 C 210 450 240 440 260 420 C 290 395 320 370 340 350 C 370 320 400 290 420 260 C 450 225 480 200 500 185 C 530 168 560 155 580 148 C 610 140 640 132 660 125"
    stroke="#c8582a" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Data points -->
  <circle cx="100" cy="480" r="5" fill="#faf9f6" stroke="#c8582a" stroke-width="2"/>
  <circle cx="180" cy="460" r="5" fill="#faf9f6" stroke="#c8582a" stroke-width="2"/>
  <circle cx="260" cy="420" r="5" fill="#faf9f6" stroke="#c8582a" stroke-width="2"/>
  <circle cx="340" cy="350" r="5" fill="#faf9f6" stroke="#c8582a" stroke-width="2"/>
  <circle cx="420" cy="260" r="5" fill="#faf9f6" stroke="#c8582a" stroke-width="2"/>
  <circle cx="500" cy="185" r="5" fill="#faf9f6" stroke="#c8582a" stroke-width="2"/>
  <circle cx="580" cy="148" r="5" fill="#faf9f6" stroke="#c8582a" stroke-width="2"/>
  <circle cx="660" cy="125" r="6" fill="#c8582a" stroke="#faf9f6" stroke-width="2"/>

  <!-- "Launch" marker -->
  <line x1="100" y1="90" x2="100" y2="500" stroke="#e8a060" stroke-width="1" stroke-dasharray="4 3"/>
  <rect x="70" y="82" width="60" height="22" rx="4" fill="#e8a060"/>
  <text x="100" y="97" font-family="system-ui, sans-serif" font-size="10" fill="#faf9f6" text-anchor="middle" font-weight="600">Launch</text>

  <!-- Current value callout -->
  <rect x="620" y="82" width="100" height="36" rx="6" fill="#292524"/>
  <text x="670" y="98" font-family="system-ui, sans-serif" font-size="10" fill="#78716c" text-anchor="middle">Visitors/mo</text>
  <text x="670" y="112" font-family="system-ui, sans-serif" font-size="13" fill="#faf9f6" text-anchor="middle" font-weight="700">1,847</text>

  <!-- Secondary line (old site baseline) -->
  <line x1="60" y1="485" x2="740" y2="485" stroke="#d4c5a9" stroke-width="1" stroke-dasharray="6 4"/>
  <text x="742" y="489" font-family="system-ui, sans-serif" font-size="9" fill="#a8a29e">Old site avg</text>

  <!-- Growth arrow annotation -->
  <path d="M 700 470 L 700 150" stroke="#292524" stroke-width="1"/>
  <polygon points="697,155 700,145 703,155" fill="#292524"/>
  <polygon points="697,465 700,475 703,465" fill="#292524"/>
  <text x="715" y="310" font-family="system-ui, sans-serif" font-size="11" fill="#292524" font-weight="600">+380%</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <!-- Background -->
  <rect width="800" height="600" rx="16" fill="#f5f0e8"/>

  <!-- iPhone frame -->
  <rect x="260" y="40" width="280" height="520" rx="36" fill="#292524"/>
  <!-- Screen bezel -->
  <rect x="268" y="48" width="264" height="504" rx="30" fill="#1a1814"/>
  <!-- Screen area -->
  <rect x="274" y="70" width="252" height="466" rx="4" fill="#faf9f6"/>

  <!-- Dynamic Island -->
  <rect x="360" y="52" width="80" height="24" rx="12" fill="#0a0a0a"/>

  <!-- Home indicator -->
  <rect x="362" y="526" width="76" height="4" rx="2" fill="#444"/>

  <!-- ============ Website on screen ============ -->

  <!-- Nav bar -->
  <rect x="274" y="70" width="252" height="36" fill="#292524"/>
  <circle cx="292" cy="88" r="4" fill="#c8582a"/>
  <rect x="302" y="85" width="40" height="6" rx="2" fill="#faf9f6" opacity="0.8"/>
  <rect x="440" y="84" width="24" height="3" rx="1" fill="#faf9f6" opacity="0.4"/>
  <rect x="468" y="84" width="24" height="3" rx="1" fill="#faf9f6" opacity="0.4"/>
  <rect x="496" y="84" width="24" height="3" rx="1" fill="#faf9f6" opacity="0.4"/>

  <!-- Hero section -->
  <rect x="274" y="106" width="252" height="100" fill="#1a1814"/>
  <rect x="290" y="130" width="120" height="8" rx="2" fill="#faf9f6" opacity="0.9"/>
  <rect x="290" y="144" width="90" height="8" rx="2" fill="#c8582a" opacity="0.8"/>
  <rect x="290" y="162" width="150" height="5" rx="2" fill="#faf9f6" opacity="0.3"/>
  <rect x="290" y="172" width="130" height="5" rx="2" fill="#faf9f6" opacity="0.3"/>
  <rect x="290" y="186" width="60" height="14" rx="7" fill="#c8582a"/>

  <!-- Content section -->
  <rect x="290" y="220" width="80" height="5" rx="2" fill="#292524" opacity="0.7"/>
  <rect x="290" y="232" width="220" height="4" rx="1" fill="#78716c" opacity="0.4"/>
  <rect x="290" y="240" width="200" height="4" rx="1" fill="#78716c" opacity="0.4"/>
  <rect x="290" y="248" width="210" height="4" rx="1" fill="#78716c" opacity="0.4"/>

  <!-- Cards row -->
  <rect x="290" y="266" width="70" height="55" rx="6" fill="#f5f0e8" stroke="#d4c5a9" stroke-width="0.5"/>
  <circle cx="325" cy="282" r="6" fill="#e8a060" opacity="0.4"/>
  <rect x="300" y="296" width="50" height="4" rx="1" fill="#292524" opacity="0.5"/>
  <rect x="304" y="306" width="42" height="3" rx="1" fill="#78716c" opacity="0.3"/>

  <rect x="366" y="266" width="70" height="55" rx="6" fill="#f5f0e8" stroke="#d4c5a9" stroke-width="0.5"/>
  <circle cx="401" cy="282" r="6" fill="#c8582a" opacity="0.4"/>
  <rect x="376" y="296" width="50" height="4" rx="1" fill="#292524" opacity="0.5"/>
  <rect x="380" y="306" width="42" height="3" rx="1" fill="#78716c" opacity="0.3"/>

  <rect x="442" y="266" width="70" height="55" rx="6" fill="#f5f0e8" stroke="#d4c5a9" stroke-width="0.5"/>
  <circle cx="477" cy="282" r="6" fill="#e8a060" opacity="0.4"/>
  <rect x="452" y="296" width="50" height="4" rx="1" fill="#292524" opacity="0.5"/>
  <rect x="456" y="306" width="42" height="3" rx="1" fill="#78716c" opacity="0.3"/>

  <!-- Another text block -->
  <rect x="290" y="336" width="100" height="5" rx="2" fill="#292524" opacity="0.6"/>
  <rect x="290" y="348" width="220" height="4" rx="1" fill="#78716c" opacity="0.35"/>
  <rect x="290" y="356" width="190" height="4" rx="1" fill="#78716c" opacity="0.35"/>

  <!-- CTA section -->
  <rect x="274" y="374" width="252" height="50" fill="#f5f0e8"/>
  <rect x="340" y="390" width="120" height="20" rx="10" fill="#c8582a"/>
  <rect x="362" y="397" width="76" height="6" rx="2" fill="#faf9f6" opacity="0.9"/>

  <!-- Footer -->
  <rect x="274" y="424" width="252" height="112" rx="0" fill="#292524"/>
  <rect x="290" y="440" width="60" height="5" rx="2" fill="#faf9f6" opacity="0.5"/>
  <rect x="290" y="452" width="100" height="3" rx="1" fill="#faf9f6" opacity="0.2"/>
  <rect x="290" y="460" width="80" height="3" rx="1" fill="#faf9f6" opacity="0.2"/>

  <!-- ============ Lighthouse Score Badge ============ -->

  <!-- Score circle — positioned overlapping phone right edge -->
  <circle cx="560" cy="180" r="72" fill="#292524"/>
  <circle cx="560" cy="180" r="66" fill="#1a1814"/>

  <!-- Green score ring -->
  <circle cx="560" cy="180" r="56" fill="none" stroke="#0cce6b" stroke-width="5" stroke-dasharray="352" stroke-dashoffset="0" stroke-linecap="round" transform="rotate(-90 560 180)"/>

  <!-- Score number -->
  <text x="560" y="174" font-family="system-ui, sans-serif" font-size="48" fill="#0cce6b" text-anchor="middle" font-weight="700">100</text>

  <!-- Label -->
  <text x="560" y="198" font-family="system-ui, sans-serif" font-size="11" fill="#78716c" text-anchor="middle">Performance</text>

  <!-- Sub-scores below -->
  <g transform="translate(490, 280)">
    <!-- Accessibility -->
    <circle cx="0" cy="0" r="22" fill="none" stroke="#0cce6b" stroke-width="3" stroke-dasharray="138" stroke-dashoffset="0" stroke-linecap="round" transform="rotate(-90 0 0)"/>
    <text x="0" y="4" font-family="system-ui, sans-serif" font-size="13" fill="#0cce6b" text-anchor="middle" font-weight="600">98</text>
    <text x="0" y="34" font-family="system-ui, sans-serif" font-size="9" fill="#78716c" text-anchor="middle">A11y</text>

    <!-- Best Practices -->
    <circle cx="70" cy="0" r="22" fill="none" stroke="#0cce6b" stroke-width="3" stroke-dasharray="138" stroke-dashoffset="0" stroke-linecap="round" transform="rotate(-90 70 0)"/>
    <text x="70" y="4" font-family="system-ui, sans-serif" font-size="13" fill="#0cce6b" text-anchor="middle" font-weight="600">100</text>
    <text x="70" y="34" font-family="system-ui, sans-serif" font-size="9" fill="#78716c" text-anchor="middle">Practices</text>

    <!-- SEO -->
    <circle cx="140" cy="0" r="22" fill="none" stroke="#0cce6b" stroke-width="3" stroke-dasharray="138" stroke-dashoffset="0" stroke-linecap="round" transform="rotate(-90 140 0)"/>
    <text x="140" y="4" font-family="system-ui, sans-serif" font-size="13" fill="#0cce6b" text-anchor="middle" font-weight="600">100</text>
    <text x="140" y="34" font-family="system-ui, sans-serif" font-size="9" fill="#78716c" text-anchor="middle">SEO</text>
  </g>

  <!-- Metrics below phone -->
  <g transform="translate(290, 470)">
    <rect x="0" y="0" width="105" height="50" rx="8" fill="#292524"/>
    <text x="52" y="20" font-family="system-ui, sans-serif" font-size="9" fill="#78716c" text-anchor="middle">LCP</text>
    <text x="52" y="38" font-family="system-ui, sans-serif" font-size="16" fill="#0cce6b" text-anchor="middle" font-weight="700">0.8s</text>

    <rect x="115" y="0" width="105" height="50" rx="8" fill="#292524"/>
    <text x="167" y="20" font-family="system-ui, sans-serif" font-size="9" fill="#78716c" text-anchor="middle">CLS</text>
    <text x="167" y="38" font-family="system-ui, sans-serif" font-size="16" fill="#0cce6b" text-anchor="middle" font-weight="700">0.00</text>

    <rect x="230" y="0" width="105" height="50" rx="8" fill="#292524"/>
    <text x="282" y="20" font-family="system-ui, sans-serif" font-size="9" fill="#78716c" text-anchor="middle">INP</text>
    <text x="282" y="38" font-family="system-ui, sans-serif" font-size="16" fill="#0cce6b" text-anchor="middle" font-weight="700">45ms</text>
  </g>
</svg>
